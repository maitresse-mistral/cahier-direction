<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur – Sorties Scolaires</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bleu: #1a3a5c; --bleu-clair: #2d6a9f;
    --or: #c9922a; --or-clair: #f5d98f;
    --fond: #f4f1eb; --blanc: #fffef9;
    --gris: #6b6b72; --gris-clair: #e8e4dc;
    --rouge: #b03030; --vert: #2e7d52;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Source Sans 3', sans-serif; background: var(--fond); color: var(--bleu); min-height: 100vh; }

  header {
    background: var(--bleu); color: var(--blanc);
    padding: 14px 36px; display: flex; align-items: center; gap: 14px;
    border-bottom: 4px solid var(--or);
  }
  header h1 { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 600; }
  header p { font-size: 0.75rem; opacity: 0.65; text-transform: uppercase; letter-spacing: 0.05em; }

  .container {
    max-width: 1150px; margin: 0 auto; padding: 24px 20px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start;
  }
  @media (max-width: 780px) { .container { grid-template-columns: 1fr; } }

  .left-col { display: flex; flex-direction: column; gap: 14px; }

  .panel {
    background: var(--blanc); border-radius: 10px;
    box-shadow: 0 2px 10px rgba(26,58,92,0.08); border: 1px solid var(--gris-clair);
    overflow: hidden;
  }

  /* ── SORTIE CARD ── */
  .sortie-card { border-bottom: 1px solid var(--gris-clair); }
  .sortie-card:last-child { border-bottom: none; }

  .sortie-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; cursor: pointer;
    background: var(--blanc); user-select: none; transition: background 0.15s;
  }
  .sortie-header:hover { background: #f0ece4; }
  .sortie-num {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--bleu); color: white;
    font-size: 0.75rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .sortie-label { flex: 1; font-size: 0.88rem; font-weight: 600; color: var(--bleu); }
  .sortie-label span { font-weight: 400; color: var(--gris); font-size: 0.8rem; }
  .sortie-badge {
    font-size: 0.65rem; font-weight: 700; padding: 2px 7px; border-radius: 10px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .badge-simple { background: #ddeeff; color: var(--bleu-clair); }
  .badge-recurrent { background: #e0f5ea; color: var(--vert); }
  .sortie-chevron { font-size: 0.7rem; color: var(--gris); transition: transform 0.2s; }
  .sortie-card.open .sortie-chevron { transform: rotate(180deg); }
  .btn-del-sortie {
    background: none; border: none; cursor: pointer;
    color: var(--gris); font-size: 1rem; padding: 2px 4px;
    border-radius: 4px; transition: color 0.15s, background 0.15s; line-height: 1;
  }
  .btn-del-sortie:hover { color: var(--rouge); background: #fde8e8; }

  .sortie-body { display: none; padding: 14px 16px 16px; border-top: 1px solid var(--gris-clair); background: #fafaf7; }
  .sortie-card.open .sortie-body { display: block; }

  /* TYPE SELECTOR */
  .type-selector {
    display: flex; gap: 8px; margin-bottom: 14px;
  }
  .type-btn {
    flex: 1; padding: 7px 10px; border-radius: 7px; border: 2px solid var(--gris-clair);
    background: var(--blanc); font-family: 'Source Sans 3', sans-serif;
    font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
    color: var(--gris); text-align: center;
  }
  .type-btn.active-simple { border-color: var(--bleu-clair); background: #ddeeff; color: var(--bleu-clair); }
  .type-btn.active-recurrent { border-color: var(--vert); background: #e0f5ea; color: var(--vert); }

  /* champs */
  .field { margin-bottom: 11px; }
  label {
    display: block; font-size: 0.72rem; font-weight: 600; color: var(--bleu);
    margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.05em;
  }
  input[type="text"], input[type="date"], input[type="time"], textarea, select {
    width: 100%; padding: 7px 10px;
    border: 1.5px solid var(--gris-clair); border-radius: 6px;
    font-family: 'Source Sans 3', sans-serif; font-size: 0.87rem;
    color: var(--bleu); background: var(--fond);
    transition: border-color 0.2s, box-shadow 0.2s; outline: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--bleu-clair); box-shadow: 0 0 0 3px rgba(45,106,159,0.12); }
  textarea { resize: vertical; min-height: 50px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 9px; }

  /* DATES RECURRENTES */
  .dates-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .date-row {
    display: grid; grid-template-columns: 1fr 80px 80px 28px; gap: 6px; align-items: center;
    background: var(--fond); border-radius: 6px; padding: 6px 8px;
    border: 1px solid var(--gris-clair);
  }
  .date-row label { font-size: 0.67rem; color: var(--gris); margin-bottom: 2px; }
  .btn-del-date {
    background: none; border: none; cursor: pointer; color: var(--gris);
    font-size: 0.85rem; border-radius: 4px; padding: 3px;
    transition: color 0.15s, background 0.15s; line-height: 1; width: 100%; text-align: center;
  }
  .btn-del-date:hover { color: var(--rouge); background: #fde8e8; }
  .btn-add-date {
    padding: 6px 10px; background: var(--blanc); color: var(--vert);
    border: 1.5px dashed var(--vert); border-radius: 6px;
    font-family: 'Source Sans 3', sans-serif; font-size: 0.8rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s; width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-add-date:hover { background: var(--vert); color: white; border-style: solid; }

  /* opts */
  .opts { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-top: 6px; }
  .opts-label { font-size: 0.7rem; font-weight: 600; color: var(--gris); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .toggle-row { display: flex; align-items: center; gap: 7px; font-size: 0.8rem; }
  .toggle { position: relative; width: 34px; height: 18px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: var(--gris-clair); border-radius: 18px; cursor: pointer; transition: background 0.2s; }
  .slider::before { content: ''; position: absolute; height: 12px; width: 12px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform 0.2s; }
  .toggle input:checked + .slider { background: var(--bleu-clair); }
  .toggle input:checked + .slider::before { transform: translateX(16px); }

  .btn-add {
    padding: 10px 16px; background: var(--blanc); color: var(--bleu);
    border: 2px dashed var(--bleu-clair); border-radius: 8px;
    font-family: 'Source Sans 3', sans-serif; font-size: 0.88rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s; width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 7px;
  }
  .btn-add:hover { background: var(--bleu); color: white; border-style: solid; }

  .btn-generate {
    padding: 11px; background: var(--bleu); color: white; border: none;
    border-radius: 8px; font-family: 'Source Sans 3', sans-serif; font-size: 0.92rem;
    font-weight: 600; cursor: pointer; transition: background 0.2s; width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 7px;
  }
  .btn-generate:hover { background: var(--bleu-clair); }

  /* ── APERÇU ── */
  .preview-panel { display: flex; flex-direction: column; gap: 12px; position: sticky; top: 20px; }
  .preview-actions { display: flex; gap: 9px; }
  .btn-action {
    flex: 1; padding: 9px; border: 2px solid var(--bleu); border-radius: 7px;
    background: transparent; color: var(--bleu); font-family: 'Source Sans 3', sans-serif;
    font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .btn-action:hover { background: var(--bleu); color: white; }
  .btn-action.or { border-color: var(--or); color: var(--or); }
  .btn-action.or:hover { background: var(--or); color: white; }

  #preview-zone {
    background: var(--blanc); border-radius: 10px;
    box-shadow: 0 2px 10px rgba(26,58,92,0.08); border: 1px solid var(--gris-clair);
    overflow: hidden;
  }
  #preview-placeholder { padding: 50px 24px; text-align: center; color: var(--gris); font-size: 0.88rem; }
  #preview-placeholder .big { font-size: 2.2rem; margin-bottom: 10px; }
  #doc-output { display: none; }
  #doc-output.visible { display: block; }

  .doc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  .doc-grid .doc-wrap:nth-child(odd) { border-right: 1.5px dashed #ccc; }
  .doc-grid .doc-wrap:nth-child(n+3) { border-top: 1.5px dashed #ccc; }

  /* ══ DOCUMENT ══ */
  .doc-wrap {
    padding: 14px 16px 10px;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 0.76rem; line-height: 1.42; color: #111;
  }
  .doc-top { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #1a3a5c; padding-bottom: 5px; margin-bottom: 7px; }
  .doc-school { font-size: 0.82rem; font-weight: 700; color: #1a3a5c; }
  .doc-date-meta { font-size: 0.68rem; color: #555; text-align: right; }
  .doc-titre { text-align: center; font-weight: 700; font-size: 0.82rem; text-decoration: underline; margin-bottom: 6px; color: #1a3a5c; }
  .doc-corps p { margin-bottom: 3px; }
  .doc-infos { margin: 5px 0; background: #eef2f7; border-left: 3px solid #2d6a9f; padding: 4px 8px; font-size: 0.73rem; display: flex; flex-wrap: wrap; gap: 1px 14px; }
  .doc-infos strong { color: #1a3a5c; }
  .doc-sign { margin-top: 5px; font-size: 0.74rem; }

  .coupon { margin-top: 7px; border: 1.2px dashed #888; border-radius: 4px; padding: 6px 10px; background: #fafafa; font-size: 0.72rem; }
  .coupon-titre { font-weight: 700; font-size: 0.69rem; text-transform: uppercase; letter-spacing: 0.05em; color: #1a3a5c; margin-bottom: 5px; }
  .coupon-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 3px 10px; margin-bottom: 4px; }
  .cf-label { font-size: 0.62rem; color: #666; text-transform: uppercase; letter-spacing: 0.04em; }
  .cf-line { border-bottom: 1px solid #999; min-height: 14px; }
  .coupon-sep { border-top: 1px dashed #ccc; margin: 3px 0; }
  .checks { display: flex; flex-direction: column; gap: 2px; margin: 2px 0; }
  .check-item { display: flex; align-items: center; gap: 5px; }
  .cb { width: 9px; height: 9px; border: 1.5px solid #444; border-radius: 2px; flex-shrink: 0; display: inline-block; }
  .coupon-sign { display: flex; gap: 10px; margin-top: 5px; }
  .cs-field { flex: 1; border-bottom: 1px solid #999; font-size: 0.66rem; color: #666; min-height: 16px; }

  @media print {
    body { background: white; }
    header, .left-col, .preview-actions, #preview-placeholder { display: none !important; }
    .container { display: block; padding: 0; max-width: 100%; }
    .preview-panel { display: block; position: static; }
    #preview-zone { box-shadow: none; border: none; border-radius: 0; }
    #doc-output { display: block !important; }
    .doc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; width: 100%; }
    .doc-wrap { break-inside: avoid; page-break-inside: avoid; padding: 6mm 7mm 5mm; }
    .doc-grid .doc-wrap:nth-child(odd) { border-right: 1px dashed #aaa; }
    .doc-grid .doc-wrap:nth-child(n+3) { border-top: 1px dashed #aaa; }
    @page { size: A4 landscape; margin: 8mm 12mm; }
  }
</style>
</head>
<body>

<header>
  <div style="font-size:26px">🏫</div>
  <div>
    <h1>Générateur de courriers – Sorties Scolaires</h1>
    <p>École Cantarelle · Académie de Montpellier</p>
  </div>
</header>

<div class="container">
  <div class="left-col">
    <div class="panel" id="sorties-list"></div>
    <button class="btn-add" onclick="ajouterSortie()">＋ Ajouter une sortie</button>
    <button class="btn-generate" onclick="generer()">📄 Générer le document</button>
  </div>

  <div class="preview-panel">
    <div class="preview-actions">
      <button class="btn-action" onclick="window.print()">🖨️ Imprimer</button>
      <button class="btn-action or" onclick="copierTexte()">📋 Copier le texte</button>
    </div>
    <div id="preview-zone">
      <div id="preview-placeholder">
        <div class="big">📋</div>
        Ajoutez une ou plusieurs sorties,<br>puis cliquez sur<br><strong>« Générer le document »</strong>.
      </div>
      <div id="doc-output"></div>
    </div>
  </div>
</div>

<script>
let compteur = 0;
// dateCompteur par sortie : stocké dans un objet
const dateCompteurs = {};

function ajouterSortie() {
  compteur++;
  const id = compteur;
  dateCompteurs[id] = 0;
  const list = document.getElementById('sorties-list');

  const card = document.createElement('div');
  card.className = 'sortie-card open';
  card.id = 'card-' + id;
  card.dataset.type = 'simple';

  card.innerHTML = `
    <div class="sortie-header" onclick="toggleCard(${id})">
      <div class="sortie-num">${id}</div>
      <div class="sortie-label">Sortie ${id} <span id="label-${id}"></span></div>
      <span class="sortie-badge badge-simple" id="badge-${id}">Unique</span>
      <span class="sortie-chevron">▲</span>
      <button class="btn-del-sortie" title="Supprimer" onclick="supprimerSortie(event,${id})">✕</button>
    </div>
    <div class="sortie-body">

      <!-- TYPE -->
      <div class="type-selector">
        <button class="type-btn active-simple" id="btn-simple-${id}" onclick="setType(${id},'simple')">📅 Sortie unique</button>
        <button class="type-btn" id="btn-recurrent-${id}" onclick="setType(${id},'recurrent')">🔁 Sortie récurrente</button>
      </div>

      <!-- CHAMPS COMMUNS -->
      <div class="row2">
        <div class="field">
          <label>École</label>
          <input type="text" id="school-${id}" value="École Cantarelle" oninput="updateLabel(${id})"/>
        </div>
        <div class="field">
          <label>Classe(s)</label>
          <input type="text" id="classe-${id}" placeholder="ex. CM2" oninput="updateLabel(${id})"/>
        </div>
      </div>
      <div class="field">
        <label>Destination / Lieu</label>
        <input type="text" id="lieu-${id}" placeholder="ex. Piscine municipale" oninput="updateLabel(${id})"/>
      </div>
      <div class="field">
        <label>Objet de la sortie</label>
        <input type="text" id="objet-${id}" placeholder="ex. Séances de natation" oninput="updateLabel(${id})"/>
      </div>

      <!-- ZONE SORTIE SIMPLE -->
      <div id="zone-simple-${id}">
        <div class="row3">
          <div class="field">
            <label>Date</label>
            <input type="date" id="date-${id}" oninput="updateLabel(${id})"/>
          </div>
          <div class="field">
            <label>Départ</label>
            <input type="time" id="dep-${id}" value="08:30"/>
          </div>
          <div class="field">
            <label>Retour</label>
            <input type="time" id="ret-${id}" value="16:30"/>
          </div>
        </div>
      </div>

      <!-- ZONE SORTIE RÉCURRENTE -->
      <div id="zone-recurrent-${id}" style="display:none">
        <div class="opts-label" style="margin-bottom:6px">Dates des séances</div>
        <div class="dates-list" id="dates-list-${id}"></div>
        <button class="btn-add-date" onclick="ajouterDate(${id})">＋ Ajouter une date</button>
      </div>

      <!-- SUITE COMMUNE -->
      <div class="field" style="margin-top:11px">
        <label>Message complémentaire (facultatif)</label>
        <textarea id="extra-${id}" placeholder="Informations supplémentaires…"></textarea>
      </div>
      <div class="field">
        <label>Signataire</label>
        <select id="signataire-${id}">
          <option value="La directrice">La directrice</option>
          <option value="Le directeur">Le directeur</option>
          <option value="L'enseignante">L'enseignante</option>
          <option value="L'enseignant">L'enseignant</option>
        </select>
      </div>
      <div class="opts-label">Options du coupon</div>
      <div class="opts">
        <div class="toggle-row">
          <label class="toggle"><input type="checkbox" id="accomp-${id}" checked><span class="slider"></span></label>
          <span>Accompagnateur</span>
        </div>
        <div class="toggle-row">
          <label class="toggle"><input type="checkbox" id="pique-nique-${id}"><span class="slider"></span></label>
          <span>Pique-nique</span>
        </div>
        <div class="toggle-row">
          <label class="toggle"><input type="checkbox" id="allergie-${id}" checked><span class="slider"></span></label>
          <span>Allergie</span>
        </div>
        <div class="toggle-row">
          <label class="toggle"><input type="checkbox" id="urgence-${id}"><span class="slider"></span></label>
          <span>Urgence</span>
        </div>
      </div>
    </div>
  `;
  list.appendChild(card);
}

function setType(id, type) {
  const card = document.getElementById('card-' + id);
  card.dataset.type = type;

  document.getElementById('zone-simple-' + id).style.display    = type === 'simple'    ? '' : 'none';
  document.getElementById('zone-recurrent-' + id).style.display = type === 'recurrent' ? '' : 'none';

  const btnS = document.getElementById('btn-simple-' + id);
  const btnR = document.getElementById('btn-recurrent-' + id);
  btnS.className = 'type-btn' + (type === 'simple' ? ' active-simple' : '');
  btnR.className = 'type-btn' + (type === 'recurrent' ? ' active-recurrent' : '');

  const badge = document.getElementById('badge-' + id);
  badge.textContent = type === 'simple' ? 'Unique' : 'Récurrente';
  badge.className = 'sortie-badge ' + (type === 'simple' ? 'badge-simple' : 'badge-recurrent');

  // Ajouter une première date si la liste est vide
  if (type === 'recurrent' && document.getElementById('dates-list-' + id).children.length === 0) {
    ajouterDate(id);
  }
}

function ajouterDate(sortieId) {
  dateCompteurs[sortieId] = (dateCompteurs[sortieId] || 0) + 1;
  const did = dateCompteurs[sortieId];
  const list = document.getElementById('dates-list-' + sortieId);

  const row = document.createElement('div');
  row.className = 'date-row';
  row.id = `drow-${sortieId}-${did}`;
  row.innerHTML = `
    <div class="field" style="margin:0">
      <label>Date</label>
      <input type="date" id="ddate-${sortieId}-${did}" oninput="updateLabel(${sortieId})"/>
    </div>
    <div class="field" style="margin:0">
      <label>Départ</label>
      <input type="time" id="ddep-${sortieId}-${did}" value="08:30"/>
    </div>
    <div class="field" style="margin:0">
      <label>Retour</label>
      <input type="time" id="dret-${sortieId}-${did}" value="16:30"/>
    </div>
    <button class="btn-del-date" onclick="supprimerDate(${sortieId},${did})" title="Supprimer">✕</button>
  `;
  list.appendChild(row);
}

function supprimerDate(sortieId, did) {
  document.getElementById(`drow-${sortieId}-${did}`)?.remove();
}

function toggleCard(id) {
  document.getElementById('card-' + id).classList.toggle('open');
}

function supprimerSortie(e, id) {
  e.stopPropagation();
  document.getElementById('card-' + id).remove();
  renumeroter();
}

function renumeroter() {
  document.querySelectorAll('.sortie-card').forEach((card, i) => {
    const n = i + 1;
    card.querySelector('.sortie-num').textContent = n;
    const lbl = card.querySelector('.sortie-label');
    const span = lbl.querySelector('span');
    lbl.innerHTML = `Sortie ${n} <span>${span ? span.textContent : ''}</span>`;
  });
}

function updateLabel(id) {
  const lieu = document.getElementById('lieu-' + id)?.value || '';
  const span = document.getElementById('label-' + id);
  if (!span) return;
  const card = document.getElementById('card-' + id);
  const type = card?.dataset.type || 'simple';
  let txt = lieu;
  if (type === 'simple') {
    const date = document.getElementById('date-' + id)?.value || '';
    if (date) {
      const d = new Date(date + 'T12:00:00').toLocaleDateString('fr-FR', { day:'numeric', month:'short' });
      txt += (txt ? ' · ' : '') + d;
    }
  } else {
    // Première date de la liste
    const firstDate = document.querySelector(`#dates-list-${id} input[type="date"]`);
    if (firstDate?.value) {
      const d = new Date(firstDate.value + 'T12:00:00').toLocaleDateString('fr-FR', { day:'numeric', month:'short' });
      txt += (txt ? ' · ' : '') + d + '…';
    }
  }
  span.textContent = txt ? '— ' + txt : '';
}

function fmt(d) {
  if (!d) return '___________';
  return new Date(d + 'T12:00:00').toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function fmtCourt(d) {
  if (!d) return '___';
  return new Date(d + 'T12:00:00').toLocaleDateString('fr-FR', { weekday:'short', day:'numeric', month:'long' });
}

function genererBloc(id) {
  const card = document.getElementById('card-' + id);
  const type = card?.dataset.type || 'simple';

  const ecole      = document.getElementById('school-' + id)?.value || 'Notre école';
  const classe     = document.getElementById('classe-' + id)?.value || '___';
  const lieu       = document.getElementById('lieu-' + id)?.value || '___';
  const objet      = document.getElementById('objet-' + id)?.value || '___';
  const msgExtra   = document.getElementById('extra-' + id)?.value || '';
  const signataire = document.getElementById('signataire-' + id)?.value || 'La directrice';

  const optAccomp    = document.getElementById('accomp-' + id)?.checked;
  const optPiqueNique = document.getElementById('pique-nique-' + id)?.checked;
  const optAllergie  = document.getElementById('allergie-' + id)?.checked;
  const optUrgence   = document.getElementById('urgence-' + id)?.checked;

  const today = new Date().toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });

  // ── Infos date(s)
  let infosDates = '';
  let infosHoraires = '';
  let txtIntro = '';

  if (type === 'simple') {
    const dateSortie = fmt(document.getElementById('date-' + id)?.value);
    const hDep = document.getElementById('dep-' + id)?.value || '__h__';
    const hRet = document.getElementById('ret-' + id)?.value || '__h__';
    infosDates   = `<span><strong>Date :</strong> ${dateSortie}</span>`;
    infosHoraires = `<span><strong>Départ :</strong> ${hDep} · <strong>Retour :</strong> ${hRet}</span>`;
    txtIntro = `<p>Nous avons le plaisir de vous informer qu'une <strong>sortie scolaire</strong> est organisée pour la classe de <strong>${classe}</strong>.</p>`;
  } else {
    // Récurrent : collecter toutes les dates
    const rows = document.querySelectorAll(`#dates-list-${id} .date-row`);
    const dateItems = [];
    rows.forEach(row => {
      const inputs = row.querySelectorAll('input');
      const d = inputs[0]?.value || '';
      const dep = inputs[1]?.value || '__h__';
      const ret = inputs[2]?.value || '__h__';
      if (d) dateItems.push({ d, dep, ret });
    });

    if (dateItems.length === 0) {
      infosDates = `<span><strong>Dates :</strong> à définir</span>`;
    } else if (dateItems.length === 1) {
      infosDates = `<span><strong>Date :</strong> ${fmt(dateItems[0].d)}</span>`;
      infosHoraires = `<span><strong>Départ :</strong> ${dateItems[0].dep} · <strong>Retour :</strong> ${dateItems[0].ret}</span>`;
    } else {
      // Vérifier si même horaire pour toutes les dates
      const memeHoraire = dateItems.every(di => di.dep === dateItems[0].dep && di.ret === dateItems[0].ret);
      if (memeHoraire) {
        infosHoraires = `<span><strong>Horaires :</strong> ${dateItems[0].dep} → ${dateItems[0].ret}</span>`;
      }
      const listeDates = dateItems.map(di => fmtCourt(di.d) + (memeHoraire ? '' : ` (${di.dep}–${di.ret})`)).join(', ');
      infosDates = `<span><strong>Dates :</strong> ${listeDates}</span>`;
    }
    txtIntro = `<p>Nous avons le plaisir de vous informer qu'une <strong>sortie scolaire récurrente</strong> est organisée pour la classe de <strong>${classe}</strong>.</p>`;
  }

  const txtPiqueNique = optPiqueNique ? `<p>🧺 <strong>Pique-nique à prévoir</strong> pour cette sortie.</p>` : '';
  const txtAccomp = optAccomp ? `<p>Si vous êtes disponible pour accompagner l'une de ces séances, merci de l'indiquer dans le coupon ci-dessous.</p>` : '';
  const txtExtra = msgExtra ? `<p>${msgExtra.replace(/\n/g,'<br>')}</p>` : '';

  // ── Coupon accompagnement
  let coupAccomp = '';
  if (optAccomp) {
    if (type === 'simple') {
      coupAccomp = `
        <div class="coupon-sep"></div>
        <div style="font-weight:600;margin-bottom:2px">Accompagnement</div>
        <div class="checks">
          <div class="check-item"><span class="cb"></span> Je souhaite accompagner la sortie.</div>
          <div class="check-item"><span class="cb"></span> Je ne suis pas disponible ce jour.</div>
        </div>`;
    } else {
      // Une case par date
      const rows = document.querySelectorAll(`#dates-list-${id} .date-row`);
      let casesHTML = '';
      rows.forEach(row => {
        const inputs = row.querySelectorAll('input');
        const d = inputs[0]?.value || '';
        if (d) casesHTML += `<div class="check-item"><span class="cb"></span> ${fmtCourt(d)}</div>`;
      });
      if (casesHTML) {
        coupAccomp = `
          <div class="coupon-sep"></div>
          <div style="font-weight:600;margin-bottom:2px">Je suis disponible pour accompagner le(s) :</div>
          <div class="checks">${casesHTML}</div>`;
      }
    }
  }

  const coupAllergie = optAllergie ? `
    <div class="coupon-sep"></div>
    <div class="cf-label">Allergie / régime alimentaire</div>
    <div class="cf-line">&nbsp;</div>` : '';

  const coupUrgence = optUrgence ? `
    <div class="coupon-sep"></div>
    <div class="cf-label">Téléphone d'urgence le jour J</div>
    <div class="cf-line">&nbsp;</div>` : '';

  return `<div class="doc-wrap">
  <div class="doc-top">
    <div class="doc-school">${ecole}<br><span style="font-weight:400;font-size:0.68rem;color:#555">Académie de Montpellier</span></div>
    <div class="doc-date-meta">Le ${today}<br>Classe : ${classe}</div>
  </div>
  <div class="doc-titre">Sortie scolaire – ${objet}</div>
  <div class="doc-corps">
    <p>Chers parents,</p>
    ${txtIntro}
  </div>
  <div class="doc-infos">
    ${infosDates}
    <span><strong>Lieu :</strong> ${lieu}</span>
    ${infosHoraires}
  </div>
  <div class="doc-corps">
    ${txtPiqueNique}${txtAccomp}${txtExtra}
    <p>Merci de retourner <strong>cette feuille</strong> signée dès que possible.</p>
  </div>
  <div class="doc-sign">
    <p>Cordialement,</p>
    <p style="font-weight:600">${signataire} – ${ecole}</p>
  </div>
  <div class="coupon">
    <div class="coupon-titre">Coupon-réponse à retourner à l'école</div>
    <div class="coupon-fields">
      <div><div class="cf-label">Nom de l'élève</div><div class="cf-line">&nbsp;</div></div>
      <div><div class="cf-label">Prénom de l'élève</div><div class="cf-line">&nbsp;</div></div>
      <div><div class="cf-label">Classe</div><div class="cf-line">&nbsp;</div></div>
      <div><div class="cf-label">Nom du parent / tuteur</div><div class="cf-line">&nbsp;</div></div>
    </div>
    ${coupAccomp}${coupAllergie}${coupUrgence}
    <div class="coupon-sign">
      <div class="cs-field">Date : ___________________</div>
      <div class="cs-field" style="flex:2">Signature du responsable légal :</div>
    </div>
  </div>
</div>`;
}

function generer() {
  const cards = document.querySelectorAll('.sortie-card');
  if (cards.length === 0) { alert('Ajoutez au moins une sortie !'); return; }
  let blocs = '';
  cards.forEach(card => { blocs += genererBloc(card.id.replace('card-', '')); });
  document.getElementById('preview-placeholder').style.display = 'none';
  const out = document.getElementById('doc-output');
  out.classList.add('visible');
  out.innerHTML = `<div class="doc-grid">${blocs}</div>`;
}

function copierTexte() {
  const out = document.getElementById('doc-output');
  if (!out.textContent.trim()) { alert("Générez d'abord le document !"); return; }
  navigator.clipboard.writeText(out.innerText).then(() => {
    const btn = event.target;
    const orig = btn.innerHTML;
    btn.innerHTML = '✅ Copié !';
    setTimeout(() => btn.innerHTML = orig, 2000);
  });
}

ajouterSortie();
</script>
</body>
</html>
